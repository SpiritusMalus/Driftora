# Static analysis configuration for HealthRoutine.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    # Generated code (drift, l10n) is not hand-maintained.
    - "**/*.g.dart"
    - "lib/l10n/app_localizations*.dart"

linter:
  rules:
    prefer_single_quotes: true
    prefer_final_locals: true

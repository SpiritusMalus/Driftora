apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

group = 'com.driftora.platformkeystore'
version = '1.0.0'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useExpoPublishing()

android {
  namespace = "com.driftora.platformkeystore"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_17.majorVersion
  }
}

dependencies {
  // (No runtime deps — Block Store custody is not wired yet; the Android module
  // is a no-op placeholder. The unused play-services-auth-blockstore dependency
  // was removed to trim APK weight. Re-add it when custody is actually implemented.)
}

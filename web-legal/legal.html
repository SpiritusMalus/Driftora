document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

one; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">Контакты<\u002Fa>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isTerms }}\" hint-placeholder-val=\"{{ false }}\">\n          <a data-spy=\"t-1\" href=\"#t-1\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">1 · О сервисе<\u002Fa>\n          <a data-spy=\"t-2\" href=\"#t-2\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">2 · Не медицинский сервис<\u002Fa>\n          <a data-spy=\"t-3\" href=\"#t-3\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">3 · Допустимое использование<\u002Fa>\n          <a data-spy=\"t-4\" href=\"#t-4\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">4 · Распознавание еды<\u002Fa>\n          <a data-spy=\"t-5\" href=\"#t-5\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">5 · Ваши данные и контент<\u002Fa>\n          <a data-spy=\"t-6\" href=\"#t-6\" style=\"display:block; padding:7px 12px; font-size:13.5px; font-weight:600; color:#75584C; text-decoration:none; border-radius:9px; border-left:2px solid transparent;\" style-hover=\"background:#FCEEE8; color:#D8513A;\">6 · Интеллектуаль g:0.12em; text-transform:uppercase; color:#C56A53; margin-bottom:14px;\">Политика конфиденциальности<\u002Fdiv>\n        <h1 class=\"legal-title\" style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:46px; line-height:1.06; letter-spacing:-0.025em; color:#2A1A14; margin:0 0 22px;\">Ваши записи зашифрованы, и ключ только у вас<\u002Fh1>\n\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:26px;\">\n          <span style=\"display:inline-flex; align-items:center; gap:7px; background:#FFFFFF; border:1px solid #EEDDD4; border-radius:11px; padding:8px 13px; font-size:13.5px; color:#75584C; font-weight:600;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D8513A\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n            Дата вступления в силу: <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px; white-space:nowrap;\">INSERT DATE<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;\">\n          <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:13px; padding:13px 15px;\">\n            <div style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#7D6053; font-weight:700; margin-bottom:4px;\">Оператор<\u002Fdiv>\n            <div style=\"font-size:14px; color:#4A372E; font-weight:600;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT LEGAL NAME / ИП<\u002Fspan> («HealthRoutine»)<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:13px; padding:13px 15px;\">\n            <div style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#7D6053; font-weight:700; margin-bottom:4px;\">Контакт<\u002Fdiv>\n            <div style=\"font-size:14px; color:#4A372E; font-weight:600;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT CONTACT EMAIL<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"font-size:16.5px; line-height:1.72; color:#4A372E; margin:0 0 36px;\">HealthRoutine — мобильное приложение для заботы о себе: дневник мыслей (КПТ/СМЭР), отметки настроения, вес, шаги и учёт питания. Ваши записи живут <strong style=\"color:#2A1A14; font-weight:700;\">на вашем устройстве<\u002Fstrong> в зашифрованной базе. По вашему выбору можно сделать <strong style=\"color:#2A1A14; font-weight:700;\">зашифрованную резервную копию<\u002Fstrong>, которую держите только вы, либо включить <strong style=\"color:#2A1A14; font-weight:700;\">необязательную зашифрованную синхронизацию<\u002Fstrong> — в обоих случаях оператор не может прочитать содержимое. Регистрации по email или телефону нет. Эта политика объясняет, какие данные обрабатываются, где они хранятся и что именно покидает устройство.<\u002Fp>\n\n        <!-- Коротко hero card -->\n        <section id=\"p-short\" data-spy-anchor=\"\" style=\"scroll-margin-top:100px;\">\n          <div style=\"background:linear-gradient(160deg, #FFF1EC 0%, #FBE0D6 100%); border:1px solid #F6D7CB; border-radius:24px; padding:28px 30px; box-shadow:0 12px 30px rgba(216,81,58,0.14);\">\n            <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#C56A53; margin-bottom:18px;\">Коротко<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:16px;\">\n              <div style=\"display:flex; gap:13px; align-items:flex-start;\">\n                <span style=\"flex:none; width:26px; height:26px; border-radius:9px; background:linear-gradient(135deg,#E86A4D,#D8513A); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(216,81,58,0.3);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"font-size:15.5px; line-height:1.55; color:#3D2A22;\">Приложение работает <strong style=\"color:#2A1A14; font-weight:700;\">без регистрации по email или телефону<\u002Fstrong>. Для необязательной синхронизации используется анонимный ключ-аккаунт — криптографический ключ, а не email/пароль.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:13px; align-items:flex-start;\">\n                <span style=\"flex:none; width:26px; height:26px; border-radius:9px; background:linear-gradient(135deg,#E86A4D,#D8513A); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(216,81,58,0.3);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"font-size:15.5px; line-height:1.55; color:#3D2A22;\">Дневник, настроение, вес, шаги и питание хранятся на вашем устройстве в зашифрованной базе. По вашему выбору — <strong style=\"color:#2A1A14; font-weight:700;\">зашифрованная резервная копия<\u002Fstrong> или <strong style=\"color:#2A1A14; font-weight:700;\">зашифрованная синхронизация<\u002Fstrong>; в обоих случаях оператор не может прочитать содержимое.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:13px; align-items:flex-start;\">\n                <span style=\"flex:none; width:26px; height:26px; border-radius:9px; background:linear-gradient(135deg,#E86A4D,#D8513A); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(216,81,58,0.3);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"font-size:15.5px; line-height:1.55; color:#3D2A22;\">В интернет уходит <strong style=\"color:#2A1A14; font-weight:700;\">только разбор еды<\u002Fstrong> — текст или фотография блюда — и только если вы сами включили распознавание через ИИ.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:13px; align-items:flex-start;\">\n                <span style=\"flex:none; width:26px; height:26px; border-radius:9px; background:linear-gradient(135deg,#E86A4D,#D8513A); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(216,81,58,0.3);\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"font-size:15.5px; line-height:1.55; color:#3D2A22;\">Мы <strong style=\"color:#2A1A14; font-weight:700;\">не продаём<\u002Fstrong> ваши данные и <strong style=\"color:#2A1A14; font-weight:700;\">не показываем<\u002Fstrong> стороннюю рекламу.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section id=\"p-storage\" style=\"scroll-margin-top:100px; padding:32px 0 4px; margin-top:14px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Где хранятся данные<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Дневник, настроение, вес и питание хранятся на вашем устройстве в зашифрованной базе (SQLCipher; ключ — в защищённом хранилище телефона). Оператор не имеет к этой базе доступа и не может её прочитать.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-sync\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#E8A53D;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Резервная копия и синхронизация<\u002Fh2><\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:9px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D8513A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M7 10l5 5 5-5M12 15V3\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Unbounded',sans-serif; font-weight:600; font-size:15.5px; color:#2A1A14;\">Резервная копия — в ваше облако<\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:15.5px; line-height:1.65; color:#4A372E; margin:0;\">Зашифрованный файл со всеми данными вы сохраняете через системное «Поделиться» в iCloud, Google Drive или куда выберете. Файл зашифрован ключом, который держите вы; оператор в этом не участвует и не может его прочитать. Для восстановления предусмотрена парольная фраза (или ключ-файл), которую храните только вы. Мастер-ключ может зеркалироваться в iCloud Keychain / Google Block Store вашей же учётной записи Apple/Google.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:9px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D8513A\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16\"><\u002Fpath><\u002Fsvg><div style=\"font-family:'Unbounded',sans-serif; font-weight:600; font-size:15.5px; color:#2A1A14;\">Синхронизация — по вашему выбору<\u002Fdiv><\u002Fdiv>\n              <p style=\"font-size:15.5px; line-height:1.65; color:#4A372E; margin:0;\">Зашифрованная синхронизация между вашими устройствами. На сервере оператора хранится только <strong style=\"color:#2A1A14; font-weight:700;\">нечитаемый шифротекст<\u002Fstrong> вашей копии плюс служебные метаданные; ключа, которым его можно открыть, у оператора нет. Функция <strong style=\"color:#2A1A14; font-weight:700;\">выключена по умолчанию<\u002Fstrong> и включается только вами; до включения в продакшене проходит проверка из раздела «Применимое право» (хост и юрисдикция — поле <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT<\u002Fspan>).<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section id=\"p-data\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Какие данные обрабатываются<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0 0 14px;\"><strong style=\"color:#2A1A14; font-weight:700;\">На устройстве.<\u002Fstrong> Записи дневника мыслей (ситуация, мысли, эмоции, реакции, доводы, переосмысление), отметки настроения (0–10), вес по дням, шаги по дням, записи о еде и её пищевой ценности, ваши цели и время напоминаний, флаги настроек. Часть из этого — данные о здоровье и психическом состоянии («специальная категория»); в открытом виде они обрабатываются на устройстве и покидают его только так, как описано выше (резервная копия или синхронизация — всегда как нечитаемый шифротекст).<\u002Fp>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0 0 14px;\"><strong style=\"color:#2A1A14; font-weight:700;\">Идентифицирующих данных нет.<\u002Fstrong> Приложение не запрашивает имя, email, телефон или точную геолокацию и не привязывает записи к личности. Данные привязаны только к устройству.<\u002Fp>\n          <div style=\"background:#FCF3E2; border:1px solid #F0DFBF; border-left:3px solid #E8A53D; border-radius:13px; padding:15px 17px;\"><p style=\"font-size:15.5px; line-height:1.65; color:#4A372E; margin:0;\"><strong style=\"color:#2A1A14; font-weight:700;\">Метаданные синхронизации.<\u002Fstrong> Если вы включили синхронизацию, сервер получает зашифрованный снимок базы (нечитаемый шифротекст) и неконтентные метаданные — публичный ключ вашего анонимного ключ-аккаунта, идентификатор устройства, размер снимка и временные метки, — а на сетевом уровне ваш IP-адрес. Расшифрованные записи серверу никогда не передаются. Эти метаданные не зашифрованы и являются единственной новой раскрываемой информацией при включённой синхронизации.<\u002Fp><\u002Fdiv>\n        <\u002Fsection>\n\n        <section id=\"p-food\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#E8A53D;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Передача данных при распознавании еды<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Если вы включили распознавание еды через ИИ, текст или фотография блюда сначала передаются на наш сервер-обработчик, который не хранит и не журналирует содержимое, а затем — в <strong style=\"color:#2A1A14; font-weight:700;\">Google Gemini<\u002Fstrong> (Google LLC, серверы в США) для определения продуктов. Это трансграничная передача данных. Калории и БЖУ рассчитываются из встроенной базы, а не нейросетью. Дневник, настроение, вес и любые другие записи не передаются. Распознавание выключено по умолчанию, включается вручную и отзывается в настройках. Перед отправкой фотография уменьшается, а геометки удаляются.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-special\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Специальная категория данных<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Данные о здоровье и психическом состоянии (дневник мыслей, настроение, вес) в <strong style=\"color:#2A1A14; font-weight:700;\">открытом виде<\u002Fstrong> обрабатываются на устройстве. Оператор и третьи лица их читаемого содержимого не получают: в ИИ-сервис разбора еды они не передаются, а в резервную копию и синхронизацию попадают только как <strong style=\"color:#2A1A14; font-weight:700;\">нечитаемый шифротекст<\u002Fstrong>, ключа от которого у оператора нет.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-use\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:16px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Как используются данные<\u002Fh2><\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:9px; width:6px; height:6px; border-radius:50%; background:#D8513A;\"><\u002Fspan><div style=\"font-size:16px; line-height:1.65; color:#4A372E;\">Чтобы показывать ваши записи, цели и динамику на самом устройстве.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:9px; width:6px; height:6px; border-radius:50%; background:#D8513A;\"><\u002Fspan><div style=\"font-size:16px; line-height:1.65; color:#4A372E;\">Чтобы отправлять локальные напоминания (их можно отключить в настройках телефона).<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:9px; width:6px; height:6px; border-radius:50%; background:#D8513A;\"><\u002Fspan><div style=\"font-size:16px; line-height:1.65; color:#4A372E;\">Чтобы (если вы включили ИИ-разбор) определить продукты по тексту или фото — цифры при этом всё равно берутся из встроенной базы.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section id=\"p-legal\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Правовые основания (152-ФЗ)<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Обработка на устройстве выполняется в ваших интересах и под вашим контролем. Трансграничная передача для ИИ-разбора выполняется <strong style=\"color:#2A1A14; font-weight:700;\">только на основании вашего отдельного согласия<\u002Fstrong>, которое вы даёте в приложении перед первой отправкой и можете отозвать в настройках. Резервное копирование и синхронизация также выполняются под вашим контролем и по вашему согласию и по умолчанию выключены. Трансграничные последствия синхронизации зависят от <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT: выбранного хоста / юрисдикции<\u002Fspan> и должны быть закрыты юридической проверкой до включения синхронизации в продакшене. <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT: ссылки на уведомления РКН — об обработке (ст. 22) и о трансграничной передаче<\u002Fspan> — заполнит оператор.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-third\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Передача третьим лицам<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0 0 14px;\">Единственный получатель <strong style=\"color:#2A1A14; font-weight:700;\">содержимого<\u002Fstrong> за пределами устройства — поставщик ИИ-распознавания (Google LLC, США), и только в объёме, описанном в разделе «Передача данных при распознавании еды». Кроме того:<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:9px; width:6px; height:6px; border-radius:50%; background:#D8513A;\"><\u002Fspan><div style=\"font-size:16px; line-height:1.65; color:#4A372E;\"><strong style=\"color:#2A1A14; font-weight:700;\">Резервная копия по вашей инициативе<\u002Fstrong> уходит в облако, которое выбираете вы сами (iCloud, Google Drive и т.&nbsp;п.) — в виде зашифрованного файла; такая передача регулируется условиями выбранного вами провайдера, а оператор в ней не участвует и содержимое файла прочитать не может.<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:11px; align-items:flex-start;\"><span style=\"flex:none; margin-top:9px; width:6px; height:6px; border-radius:50%; background:#D8513A;\"><\u002Fspan><div style=\"font-size:16px; line-height:1.65; color:#4A372E;\"><strong style=\"color:#2A1A14; font-weight:700;\">Синхронизация, если вы её включите<\u002Fstrong>, передаёт оператору на хост <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT: host<\u002Fspan> только нечитаемый шифротекст и метаданные (без расшифрованных записей).<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:14px 0 0;\">Мы не продаём персональные данные и не передаём их для рекламы. Данные могут быть раскрыты, только если этого требует закон.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-retention\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Хранение и удаление<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Записи хранятся на устройстве, пока вы их не удалите или не удалите приложение. <strong style=\"color:#2A1A14; font-weight:700;\">Резервную копию<\u002Fstrong> вы удаляете сами — удалив файл в своём облаке. При включённой <strong style=\"color:#2A1A14; font-weight:700;\">синхронизации<\u002Fstrong> удаление аккаунта/снимка убирает хранимый у оператора шифротекст. Запросы к ИИ-сервису обрабатываются эфемерно: содержимое не сохраняется на сервере оператора и не журналируется. <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT: при наличии — условия хранения у поставщика ИИ / DPA<\u002Fspan>.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-rights\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Ваши права<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Вы в любой момент управляете своими данными прямо на устройстве: можете изменить или удалить записи, отключить ИИ-разбор, выключить синхронизацию и удалить резервные копии. Для <strong style=\"color:#2A1A14; font-weight:700;\">переносимости<\u002Fstrong> вам не нужен запрос к оператору — полный зашифрованный экспорт всех данных вы уже держите сами в виде файла резервной копии. Поскольку в открытом (читаемом) виде оператор ваши записи не хранит, отдельный запрос на доступ/исправление/удаление к нему по их содержимому не требуется; при включённой синхронизации хранимый шифротекст удаляется удалением аккаунта/снимка. По остальным вопросам: <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT CONTACT EMAIL<\u002Fspan>.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-children\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Дети<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Приложение не предназначено для детей младше <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">13 / 16 — выбрать по рынкам<\u002Fspan>. Мы сознательно не собираем данные детей младше этого возраста.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-security\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Безопасность<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">База данных на устройстве шифруется (SQLCipher), ключ хранится в защищённом хранилище ОС (Keychain/Keystore). Передача к ИИ-сервису идёт по TLS. Резервные копии и синхронизация защищены <strong style=\"color:#2A1A14; font-weight:700;\">сквозным шифрованием (E2E)<\u002Fstrong>: данные зашифрованы ключом, который держите вы, и оператор не располагает ключом, способным их прочитать, — даже на сервере хранится лишь нечитаемый шифротекст. Ни один способ передачи или хранения не является абсолютно безопасным, но мы стремимся защитить ваши данные.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-changes\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Изменения<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Мы можем обновлять эту политику. Новая дата вступления в силу публикуется здесь, а при существенных изменениях — повторно запрашивается согласие в приложении.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"p-contacts\" style=\"scroll-margin-top:100px; padding:32px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:14px;\"><span style=\"width:9px; height:9px; border-radius:3px; background:#D8513A;\"><\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Контакты<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT LEGAL NAME<\u002Fspan> — <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT CONTACT EMAIL<\u002Fspan> — <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT POSTAL ADDRESS, если требует магазин/рынок<\u002Fspan><\u002Fp>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===================== TERMS ===================== -->\n      <sc-if value=\"{{ isTerms }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#C56A53; margin-bottom:14px;\">Пользовательское соглашение<\u002Fdiv>\n        <h1 class=\"legal-title\" style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:46px; line-height:1.06; letter-spacing:-0.025em; color:#2A1A14; margin:0 0 22px;\">Спокойный, честный, личный инструмент<\u002Fh1>\n\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px;\">\n          <span style=\"display:inline-flex; align-items:center; gap:7px; background:#FFFFFF; border:1px solid #EEDDD4; border-radius:11px; padding:8px 13px; font-size:13.5px; color:#75584C; font-weight:600;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#D8513A\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 2\"><\u002Fpath><\u002Fsvg>\n            Дата вступления в силу: <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px; white-space:nowrap;\">INSERT DATE<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px;\">\n          <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:13px; padding:13px 15px;\">\n            <div style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#7D6053; font-weight:700; margin-bottom:4px;\">Оператор<\u002Fdiv>\n            <div style=\"font-size:14px; color:#4A372E; font-weight:600;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT LEGAL NAME / ИП<\u002Fspan> («HealthRoutine»)<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFFFFF; border:1px solid #EEDDD4; border-radius:13px; padding:13px 15px;\">\n            <div style=\"font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:#7D6053; font-weight:700; margin-bottom:4px;\">Контакт<\u002Fdiv>\n            <div style=\"font-size:14px; color:#4A372E; font-weight:600;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT CONTACT EMAIL<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"font-size:16.5px; line-height:1.72; color:#4A372E; margin:0 0 32px;\">Используя приложение HealthRoutine («Приложение»), вы соглашаетесь с настоящим Соглашением. Если вы не согласны — не используйте Приложение.<\u002Fp>\n\n        <section id=\"t-1\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">01<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">О сервисе<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">HealthRoutine помогает заботиться о себе: вести дневник мыслей (КПТ/СМЭР), отмечать настроение, вес и шаги, учитывать питание. Приложение предоставляется для личного некоммерческого использования. Ваши записи хранятся на устройстве в зашифрованном виде; по вашему выбору можно сделать зашифрованную резервную копию или включить необязательную зашифрованную синхронизацию (через анонимный ключ-аккаунт, без регистрации по email/телефону) — в обоих случаях оператор не может прочитать содержимое. Подробности — в Политике конфиденциальности.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-2\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">02<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Не медицинский сервис<\u002Fh2><\u002Fdiv>\n          <div style=\"background:#FCF3E2; border:1px solid #F0DFBF; border-left:3px solid #E8A53D; border-radius:13px; padding:16px 18px; font-size:16px; line-height:1.68; color:#4A372E;\">Приложение — инструмент самопомощи и не является медицинским изделием, средством диагностики или лечения и не заменяет консультацию врача или психотерапевта. Если вам нужна помощь — обратитесь к специалисту. <strong style=\"color:#2A1A14; font-weight:700;\">В кризисной ситуации обращайтесь в экстренные службы.<\u002Fstrong><\u002Fdiv>\n        <\u002Fsection>\n\n        <section id=\"t-3\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">03<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Допустимое использование<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Вы соглашаетесь не пытаться: (a) вскрывать, изменять или обходить механизмы Приложения; (b) использовать Приложение противоправно; (c) загружать в функции ИИ-разбора содержимое, нарушающее права третьих лиц или закон.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-4\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#E8A53D;\">04<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Распознавание еды через ИИ — без гарантии точности<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Если вы включите ИИ-разбор, продукты определяются с помощью внешней нейросети (Google Gemini, США), а калории и БЖУ берутся из встроенной базы данных. Результат может быть неточным или неполным. Это вспомогательная оценка, а не медицинская или диетологическая рекомендация; проверяйте важные значения. ИИ-разбор выключен по умолчанию, включается вами вручную и отзывается в настройках; передача данных при этом описана в Политике конфиденциальности.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-5\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">05<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Ваши данные и контент<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Ваши записи принадлежат вам и хранятся на вашем устройстве в зашифрованном виде. Оператор к их читаемому содержимому доступа не имеет — в том числе при резервной копии и синхронизации, куда данные попадают только как нечитаемый шифротекст. При включённом ИИ-разборе вы поручаете обработать переданный текст или фотографию блюда исключительно для определения продуктов, как описано в Политике конфиденциальности. Не загружайте в ИИ-разбор то, что не хотите передавать вовне (например, лица, документы или посторонних людей в кадре).<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-6\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">06<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Интеллектуальная собственность<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Приложение, его дизайн, контент и программный код принадлежат оператору или его лицензиарам. Вам предоставляется личная, отзывная, неисключительная, непередаваемая лицензия на использование Приложения.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-7\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">07<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Доступность и изменения<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Мы можем изменять, приостанавливать или прекращать работу любой части Приложения. Мы можем обновлять настоящее Соглашение; о существенных изменениях сообщается в Приложении или обновлением даты вступления в силу. Продолжение использования означает согласие с изменениями.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-8\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">08<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Отказ от гарантий<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Приложение предоставляется «как есть» и «как доступно», без каких-либо гарантий, в максимально допустимой законом степени. Мы не гарантируем бесперебойную или безошибочную работу и точность ИИ-распознавания.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-9\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">09<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Ограничение ответственности<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">В максимально допустимой законом степени оператор не несёт ответственности за косвенные, случайные или сопутствующие убытки, а также за потерю данных. <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT: любые ограничения, специфичные для юрисдикции<\u002Fspan>. Ничто не ограничивает ответственность, которая не может быть ограничена по закону.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-10\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">10<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Применимое право и споры<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\">Настоящее Соглашение регулируется правом <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT JURISDICTION<\u002Fspan>. Споры разрешаются в <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT VENUE<\u002Fspan>, если иное не предусмотрено императивными нормами вашего законодательства.<\u002Fp>\n        <\u002Fsection>\n\n        <section id=\"t-11\" style=\"scroll-margin-top:100px; padding:30px 0 4px; border-top:1px solid #EEDDD4;\">\n          <div style=\"display:flex; align-items:baseline; gap:13px; margin-bottom:13px;\"><span style=\"font-family:'Unbounded',sans-serif; font-weight:800; font-size:17px; color:#D8513A;\">11<\u002Fspan><h2 style=\"font-family:'Unbounded',sans-serif; font-weight:700; font-size:23px; letter-spacing:-0.01em; color:#2A1A14; margin:0;\">Контакты<\u002Fh2><\u002Fdiv>\n          <p style=\"font-size:16px; line-height:1.72; color:#4A372E; margin:0;\"><span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT LEGAL NAME<\u002Fspan> — <span style=\"background:#FBEFD9; color:#B0791D; border:1px dashed #E6C68A; border-radius:6px; padding:0 7px;\">INSERT CONTACT EMAIL<\u002Fspan><\u002Fp>\n        <\u002Fsection>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"border-top:1px solid #EEDDD4; background:#FFFFFF;\">\n    <div style=\"max-width:1140px; margin:0 auto; padding:32px; display:flex; flex-wrap:wrap; gap:18px; align-items:center; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <svg width=\"28\" height=\"18\" viewBox=\"0 0 132 46\" fill=\"none\" aria-hidden=\"true\">\n          <path d=\"M6 38 C 38 6, 94 6, 126 38\" stroke=\"#C2A99E\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"6\" cy=\"38\" r=\"6.5\" fill=\"#C2A99E\"><\u002Fcircle>\n          <circle cx=\"126\" cy=\"38\" r=\"6.5\" fill=\"#C2A99E\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span style=\"font-family:'Unbounded',sans-serif; font-weight:600; font-size:15px; color:#75584C;\">HealthRoutine<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:13px; color:#A6897C; max-width:520px; line-height:1.55;\">Тело и разум в одном. Сквозное шифрование, без регистрации по email, без рекламы.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: (typeof location !== 'undefined' && (location.pathname.indexOf('terms') !== -1 || new URLSearchParams(location.search).get('tab') === 'terms')) ? 'terms' : 'privacy' };\n\n  componentDidMount() { document.title = this.state.tab === 'terms' ? 'HealthRoutine — Пользовательское соглашение' : 'HealthRoutine — Политика конфиденциальности'; this.setupSpy(); }\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState && prevState.tab !== this.state.tab) {\n      window.scrollTo({ top: 0, behavior: 'auto' });\n      this.setupSpy();\n    }\n  }\n  componentWillUnmount() { if (this._obs) this._obs.disconnect(); }\n\n  setupSpy() {\n    if (this._obs) this._obs.disconnect();\n    setTimeout(() => {\n      const sections = Array.from(document.querySelectorAll('section[id]'));\n      const links = Array.from(document.querySelectorAll('a[data-spy]'));\n      if (!sections.length || !links.length) return;\n      const setActive = (id) => {\n        links.forEach(l => {\n          const on = l.getAttribute('data-spy') === id;\n          l.style.color = on ? '#C2451F' : '#75584C';\n          l.style.background = on ? '#FCEEE8' : 'transparent';\n          l.style.borderLeftColor = on ? '#D8513A' : 'transparent';\n        });\n      };\n      this._obs = new IntersectionObserver((entries) => {\n        const visible = entries.filter(e => e.isIntersecting)\n          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);\n        if (visible[0]) setActive(visible[0].target.id);\n      }, { rootMargin: '-90px 0px -65% 0px', threshold: 0 });\n      sections.forEach(s => this._obs.observe(s));\n      setActive(sections[0].id);\n    }, 60);\n  }\n\n  renderVals() {\n    const isPrivacy = this.state.tab === 'privacy';\n    const isTerms = this.state.tab === 'terms';\n    const base = \"display:flex; align-items:center; gap:7px; border:none; cursor:pointer; border-radius:10px; padding:8px 14px; font-family:'Manrope',system-ui,sans-serif; font-size:13.5px; font-weight:700; transition:all .15s;\";\n    const active = base + \" background:linear-gradient(135deg,#E86A4D,#D8513A); color:#fff; box-shadow:0 4px 12px rgba(216,81,58,0.32);\";\n    const inactive = base + \" background:transparent; color:#75584C;\";\n    return {\n      isPrivacy, isTerms,\n      privSelected: isPrivacy ? 'true' : 'false',\n      termsSelected: isTerms ? 'true' : 'false',\n      activeTabId: isPrivacy ? 'tab-privacy' : 'tab-terms',\n      showPrivacy: () => { try { history.replaceState(null, '', '/privacy'); } catch (e) {} document.title = 'HealthRoutine — Политика конфиденциальности'; window.scrollTo({ top: 0, behavior: 'auto' }); this.setState({ tab: 'privacy' }); },\n      showTerms: () => { try { history.replaceState(null, '', '/terms'); } catch (e) {} document.title = 'HealthRoutine — Пользовательское соглашение'; window.scrollTo({ top: 0, behavior: 'auto' }); this.setState({ tab: 'terms' }); },\n      privTabStyle: isPrivacy ? active : inactive,\n      termsTabStyle: isTerms ? active : inactive,\n      privIconColor: isPrivacy ? '#ffffff' : '#75584C',\n      termsIconColor: isTerms ? '#ffffff' : '#75584C',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
